version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: paper_trainer_db
    environment:
      POSTGRES_USER: paper_trainer
      POSTGRES_PASSWORD: paper_trainer
      POSTGRES_DB: paper_trainer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paper_trainer"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - paper_trainer_network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paper_trainer_backend
    command: uv run uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://paper_trainer:paper_trainer@db:5432/paper_trainer
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - paper_trainer_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  paper_trainer_network:
    driver: bridge
