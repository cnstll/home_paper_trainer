repos:
  # Ruff: Linting and formatting for Python
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Prettier: Formatting for HTML, CSS, JS (HTMX + Tailwind)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types: [html, css, javascript, json, yaml, markdown]
        # No need to install prettier globally; pre-commit handles it
        args: [--write]

  # Pytest: Run tests before committing
  - repo: local
    hooks:
      - id: pytest
        name: Run pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true
